<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A3 Media Player</title>

    <!-- Header Font -->
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <! -- Other Font -->
    <link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
</head>
<body>
<!-- Header Section -->
<header>
    <h1>C r a f t s p a  c e</h1>
</header>

<!-- Navigation Section -->
<nav>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Saved</a></li>
        <li><a href="#">Help</a></li>
        <!-- Navigation Names changed -->
    </ul>
</nav>
<!-- Main Content Section -->
<main class="container">

    <div class="page-layout">

        <!-- LEFT SIDE (video + description) -->
        <div class="main-content">

            <section class="video-title">
                <h2>Handheld Paper Windmills</h2>
            </section>

            <div class="media-player">
                <video id="custom-video-player" controls>
                    <source src="https://thelongesthumstore.sgp1.cdn.digitaloceanspaces.com/IM-2250/berry-bunch_handheld-windmill-fan.mp4" type="video/mp4" />
                </video>

                <div class="custom-controls">
                    <button id="play-pause-btn" onclick="togglePlayPause()">
                        <img id="play-pause-img"
                             src="https://img.icons8.com/ios-glyphs/30/play--v1.png"
                             width="24" height="24">
                    </button>

                    <div class="progress-bar">
                        <span id="progress-bar-fill"></span>
                    </div>
                    <!-- fullscreen -->
                    <button id="fullscreen-btn" onclick="toggleFullscreen()">
                        <img
                                id="fullscreen-icon"
                                src="https://img.icons8.com/?size=100&id=69155&format=png&color=000000"
                                width="24"
                                height="24"
                                alt="Fullscreen">
                    </button>
                </div>
            </div>
            <!-- Buttons outside media player -->
            <div class="media-actions">
                <button class="action-btn">❤️ </button>
                <button class="action-btn">💬 </button>
                <button class="action-btn">🔗</button>
            </div>

            <section>
                <h3>Video Description</h3>
                <p>Easy and fun paper windmills to make for your kids or even with your kids!</p>
            </section>

        </div>

        <!-- RIGHT SIDE (comments) -->
        <aside class="comments-section">

            <h3>Comments</h3>

            <div class="comment-form">
                <input type="text" id="comment-input" placeholder="Write a comment...">
                <button onclick="addComment()">Post</button>
            </div>

            <div id="comment-list"></div>

        </aside>

    </div>

</main>

<!-- Footer Section -->
<footer>
    <p>&copy; 2024 Media Player Website. All rights reserved.</p>
   Play And Fullscreen icon by
    <a href="https://icons8.com">Icons8</a>

</footer>
</body>
</html>
